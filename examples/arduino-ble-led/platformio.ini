[env:nrf54l15dk]
platform = nordicnrf54
board = nrf54l15dk
framework = arduino
; Bluefruit54Lib pulls nRF54Crypto inside #elif defined(NRF_CRACEN);
; PIO LDF's default chain mode doesn't walk conditional includes, so
; the crypto library never gets linked and BLESecurity.cpp references
; nRF54CryptoClass:: come out unresolved. deep+ follows both branches.
lib_ldf_mode = deep+
